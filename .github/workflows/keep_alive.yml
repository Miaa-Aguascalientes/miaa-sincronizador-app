name: Despierta la aplicacion sincronizadora Streamlit

on:
  schedule:
    # Se ejecuta cada 30 minutos (está bien, pero con 1 vez cada 2 horas suele bastar)
    - cron: '*/30 * * * *'
  workflow_dispatch: 

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit App
        run: |
          # 1. URL corregida (sin la doble barra al final)
          URL="https://miaa-sincronizador-ver-app.streamlit.app"
          
          echo "Iniciando ping a: $URL"
          
          # 2. Usamos -I (Head request) para que sea más ligero pero efectivo
          # 3. Quitamos el límite de redirecciones o lo subimos, Streamlit usa muchas.
          STATUS=$(curl -L -I -s -o /dev/null -w "%{http_code}" \
            --connect-timeout 20 \
            --max-time 40 \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36" \
            -H "Accept: text/html" \
            "$URL") || echo "000"
          
          echo "La aplicación respondió con el código: $STATUS"
          
          if [ "$STATUS" -eq 200 ] || [ "$STATUS" -eq 301 ] || [ "$STATUS" -eq 302 ]; then
            echo "✅ Conexión establecida o redireccionada con éxito ($STATUS)."
          else
            echo "⚠️ Código $STATUS. Si es 404, revisa que la URL sea exacta."
            # Si el código es 000 o algo raro, a veces el ping igual activa el container.
          fi
