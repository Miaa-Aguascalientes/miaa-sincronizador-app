name: Despertar Sincronizador app

on:
  schedule:
    - cron: '*/15 * * * *' # Se ejecuta cada 15 minutos
  workflow_dispatch: # Permite ejecución manual

jobs:
  wake-up-miaa:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Forzar Despertar MIAA
        run: |
          node -e "
          const { chromium } = require('playwright');
          (async () => {
            try {
              const browser = await chromium.launch({ headless: true });
              const page = await browser.newPage();
              
              // Simular un navegador real
              await page.setExtraHTTPHeaders({
                'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36'
              });

              console.log('Intentando despertar: https://miaa-sincronizador-ver-app.streamlit.app');
              
              // Tiempo de espera extendido a 2 minutos para el booteo inicial
              await page.goto('https://miaa-sincronizador-ver-app.streamlit.app', { 
                waitUntil: 'networkidle', 
                timeout: 120000 
              });

              // Esperamos a que aparezca cualquier elemento de la interfaz de Streamlit
              await page.waitForSelector('body');
              
              // Realizamos movimientos para activar los WebSockets
              await page.mouse.move(100, 100);
              await page.mouse.move(200, 200);
              await page.evaluate(() => window.scrollBy(0, 300));
              
              console.log('Interacción completada. Esperando renderizado...');
              
              // Permanecemos 30 segundos para asegurar que el contenedor no se cierre
              await new Promise(r => setTimeout(r, 30000));
              
              await browser.close();
              console.log('✅ Aplicación MIAA Sincronizador despertada con éxito.');
            } catch (err) {
              console.error('❌ Error al intentar despertar la app:', err);
              process.exit(1);
            }
          })();
          "
