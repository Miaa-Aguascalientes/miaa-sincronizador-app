name: Despertar Sincronizador app

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  wake-up-miaa:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Ejecutar Despertar de Alta Intensidad
        run: |
          node -e "
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch({ headless: true });
            const context = await browser.newContext({
              viewport: { width: 1280, height: 720 },
              deviceScaleFactor: 1,
            });
            const page = await context.newPage();
            
            try {
              console.log('Navegando a la App MIAA...');
              
              // 1. Intentamos cargar la página con un tiempo de espera largo
              await page.goto('https://miaa-sincronizador-ver-app.streamlit.app', { 
                waitUntil: 'domcontentloaded', 
                timeout: 100000 
              });

              // 2. Esperamos un poco para que aparezca el botón de 'Wake up' si es que existe
              await new Promise(r => setTimeout(r, 15000));

              // 3. SIMULACIÓN HUMANA: Hacemos clics aleatorios para forzar el despertar
              console.log('Simulando interacción humana...');
              await page.mouse.click(500, 500);
              await page.mouse.wheel(0, 400);
              await new Promise(r => setTimeout(r, 5000));
              await page.mouse.click(300, 300);
              
              // 4. Esperamos a que el sistema de Streamlit registre la sesión activa
              console.log('Esperando confirmación de servidor...');
              await new Promise(r => setTimeout(r, 30000));
              
              await browser.close();
              console.log('✅ Intento de despertar completado para MIAA.');
            } catch (err) {
              console.error('❌ Error crítico:', err);
              await browser.close();
              process.exit(1);
            }
          })();
          "
